<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>form style</title>
</head>
<body>
    <div class="container">
 <div class="text">
        <h1>Let's Chat</h1>
        <p>Whether you have a question, want to<br>
        start a project or simply want to connect.

        <br><br>

        Feel free to sent me a message in the<br>
         &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
         contact form</p>
    </div>
   <form class="form">
     <h1>contact</h1>
     <label for="name">Name</label><br>
        <input type="text" pattern="[A-Za-Z]+" autofocus required><br>
        <label for="email">Email</label><br>
        <input type="text" pattern="[A-Za-Z-@-.0-9]+"  required><br>
        <label for="company">Company</label><br>
        <input type="text" ><br>
         <label >Phone</label><br>
        <input type="tel" pattern="[0-9]{11}" ><br>
        <label for="text">Message</label><br>
         <textarea cols="30" row="4"></textarea><br>
        <input class="btn" type="submit" value="SUBMIT">
   </form>
    </div>
   
</body>
</html>
